<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3abff8",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101d23",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .sphere-gradient {
            background: radial-gradient(circle at center, #3abff8 0%, transparent 70%);
        }
        .scanline {
            background: linear-gradient(to bottom, transparent 50%, rgba(58, 191, 248, 0.05) 50%);
            background-size: 100% 4px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Top App Bar Component -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between border-b border-primary/10">
<div class="text-primary flex size-12 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined text-2xl">close</span>
</div>
<div class="flex flex-col items-center">
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">Voice Assistant</h2>
<span class="text-[10px] text-primary font-bold tracking-[0.2em] uppercase">Stealth Mode</span>
</div>
<div class="flex w-12 items-center justify-end">
<button class="flex items-center justify-center rounded-lg h-12 bg-transparent text-primary">
<span class="material-symbols-outlined text-2xl">settings</span>
</button>
</div>
</div>
<!-- Stealth Status Banner -->
<div class="flex flex-col items-center justify-center py-4 bg-primary/5 border-b border-primary/10">
<div class="flex items-center gap-2">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
</span>
<h4 class="text-primary text-xs font-bold leading-normal tracking-[0.2em]">ENCRYPTED UPLINK ACTIVE</h4>
</div>
</div>
<!-- Main Visualization Area -->
<div class="flex w-full grow flex-col items-center justify-center p-6 @container">
<div class="relative w-full max-w-md aspect-square flex items-center justify-center rounded-xl bg-slate-900/40 border border-primary/20 overflow-hidden shadow-2xl shadow-primary/5">
<!-- Scanline Overlay -->
<div class="absolute inset-0 scanline pointer-events-none opacity-20"></div>
<!-- 3D Sphere Representation (Static SVG for Visualization) -->
<div class="relative flex items-center justify-center w-64 h-64">
<div class="absolute inset-0 rounded-full sphere-gradient opacity-20 animate-pulse"></div>
<svg class="w-full h-full text-primary opacity-80" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="48" stroke="currentColor" stroke-dasharray="2 2" stroke-width="0.5"></circle>
<ellipse cx="50" cy="50" fill="none" rx="48" ry="15" stroke="currentColor" stroke-width="0.5"></ellipse>
<ellipse cx="50" cy="50" fill="none" rx="15" ry="48" stroke="currentColor" stroke-width="0.5"></ellipse>
<circle cx="50" cy="50" fill="none" r="25" stroke="currentColor" stroke-width="1"></circle>
<path d="M50 2 L50 98 M2 50 L98 50" stroke="currentColor" stroke-width="0.2"></path>
</svg>
<!-- Audio Wave Visualizer Simulation -->
<div class="absolute bottom-10 flex gap-1 items-end h-8">
<div class="w-1 bg-primary h-4 rounded-full"></div>
<div class="w-1 bg-primary h-6 rounded-full"></div>
<div class="w-1 bg-primary h-3 rounded-full"></div>
<div class="w-1 bg-primary h-8 rounded-full"></div>
<div class="w-1 bg-primary h-5 rounded-full"></div>
</div>
</div>
<!-- Technical Metrics Overlays -->
<div class="absolute top-4 left-4 font-mono text-[10px] text-primary/60">
<p>FRQ: 44.1KHZ</p>
<p>BIT: 256KBPS</p>
<p>LAT: 12MS</p>
</div>
<div class="absolute bottom-4 right-4 font-mono text-[10px] text-primary/60 text-right">
<p>SIG: -42dBm</p>
<p>NOI: 0.002%</p>
<p>TRX: STABLE</p>
</div>
</div>
</div>
<!-- Transcription Section -->
<div class="px-6 pb-8 text-center space-y-4">
<div class="space-y-1">
<h3 class="text-slate-900 dark:text-slate-100 tracking-tight text-xl font-medium leading-tight italic">
                    "Initiate system diagnostic..."
                </h3>
<p class="text-primary text-sm font-semibold tracking-wide uppercase opacity-80">Processing Voice Input</p>
</div>
<div class="flex flex-col gap-4 items-center">
<!-- Real-time metrics -->
<div class="flex justify-between w-full max-w-xs px-4 py-2 rounded-lg bg-primary/5 border border-primary/10">
<div class="flex flex-col items-start">
<span class="text-[9px] uppercase font-bold text-primary/60">Noise Level</span>
<span class="text-sm font-mono text-primary">-84.2 dB</span>
</div>
<div class="flex flex-col items-end">
<span class="text-[9px] uppercase font-bold text-primary/60">Confidence</span>
<span class="text-sm font-mono text-primary">98.4%</span>
</div>
</div>
<!-- Action Bar -->
<div class="flex items-center gap-6 pt-4">
<button class="w-12 h-12 flex items-center justify-center rounded-full border border-primary/20 text-primary hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">mic_off</span>
</button>
<button class="w-20 h-20 flex items-center justify-center rounded-full bg-primary text-background-dark shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-4xl font-bold">graphic_eq</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full border border-primary/20 text-primary hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">keyboard</span>
</button>
</div>
</div>
</div>
<!-- Bottom Status Bar -->
<div class="mt-auto p-4 flex justify-between items-center text-[10px] font-mono text-primary/40 uppercase tracking-widest border-t border-primary/5">
<span>Core v4.2.0</span>
<div class="flex gap-4">
<span>Buffer: Clear</span>
<span>ID: Stealth_09</span>
</div>
</div>
</div>
</body></html>
